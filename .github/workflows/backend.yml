name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - name: Deploy Backend (Staging)
        run: |
          cd ~/SwisTrade/server
          
          # Preserve .env file
          if [ -f .env ]; then
            cp .env /tmp/.env.staging.backup
            echo "✓ .env backed up"
          fi
          
          # Pull latest code
          git fetch origin develop
          git reset --hard origin/develop
          
          # Restore .env file
          if [ -f /tmp/.env.staging.backup ]; then
            cp /tmp/.env.staging.backup .env
            rm /tmp/.env.staging.backup
            echo "✓ .env restored"
          fi
          
          # Activate venv and install dependencies
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Restart service
          sudo systemctl restart swistrade-api
          
          echo "✓ Staging backend deployed!"

  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    environment: production

    steps:
      - name: Deploy Backend (Production)
        run: |
          cd ~/SwisTrade/server
          
          # Preserve .env file
          if [ -f .env ]; then
            cp .env /tmp/.env.prod.backup
            echo "✓ .env backed up"
          fi
          
          # Create backup of current app code
          BACKUP_DIR="app_backup_$(date +%Y%m%d_%H%M%S)"
          cp -r app $BACKUP_DIR
          echo "✓ Code backup: $BACKUP_DIR"
          
          # Pull latest code
          git fetch origin main
          git reset --hard origin/main
          
          # Restore .env file
          if [ -f /tmp/.env.prod.backup ]; then
            cp /tmp/.env.prod.backup .env
            rm /tmp/.env.prod.backup
            echo "✓ .env restored"
          fi
          
          # Activate venv and install dependencies
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Restart service
          sudo systemctl restart swistrade-api

          # Health check — retry up to 60s while the FastAPI app boots
          # (MongoDB connect + Beanie init + seeders need more than 5s on a cold restart).
          HEALTH_OK=0
          for i in $(seq 1 30); do
            BODY=$(curl -fsS --max-time 3 http://localhost:8000/health 2>/dev/null || true)
            if echo "$BODY" | grep -q '"status":"ok"'; then
              HEALTH_OK=1
              echo "✓ Health check passed on attempt $i"
              break
            fi
            sleep 2
          done

          if [ "$HEALTH_OK" -ne 1 ]; then
            echo "✗ Health check failed after 60s. Recent service logs:"
            sudo journalctl -u swistrade-api -n 80 --no-pager || true

            echo "Rolling back to $BACKUP_DIR..."
            rm -rf app
            cp -r $BACKUP_DIR app
            sudo systemctl restart swistrade-api
            exit 1
          fi

          # Prune old backups, keep last 5
          ls -1dt app_backup_* 2>/dev/null | tail -n +6 | xargs -r rm -rf

          echo "✓ Production backend deployed!"

  rollback:
    name: Rollback Production
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Rollback to previous version
        run: |
          cd ~/SwisTrade/server
          
          # Find latest backup
          LATEST_BACKUP=$(ls -td app_backup_* 2>/dev/null | head -1)
          
          if [ -z "$LATEST_BACKUP" ]; then
            echo "No backup found!"
            exit 1
          fi
          
          # Preserve current .env
          cp .env /tmp/.env.rollback.backup
          
          # Restore from backup
          rm -rf app
          cp -r $LATEST_BACKUP app
          
          # Restore .env
          cp /tmp/.env.rollback.backup .env
          
          # Restart service
          sudo systemctl restart swistrade-api
          
          echo "✓ Rolled back to: $LATEST_BACKUP"
